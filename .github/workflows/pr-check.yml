name: PR Check
on:
  pull_request:
    branches: [main]
permissions:
  pull-requests: write
  contents: read
jobs:
  check:
    name: PR Quality Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - id: lint
        run: npm run lint
        working-directory: frontend
        continue-on-error: true
      - id: format
        run: npm run format:check
        working-directory: frontend
        continue-on-error: true
      - id: typecheck
        run: npm run type-check
        working-directory: frontend
        continue-on-error: true
      - id: test
        run: npm run test
        working-directory: frontend
        continue-on-error: true
      - id: build
        run: npm run build
        working-directory: frontend
        continue-on-error: true
      - uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: pr-check
          message: |
            ## NoteGenius AI - PR Check Results
            | Check | Status |
            |-------|--------|
            | ESLint | ${{ steps.lint.outcome == 'success' && 'Passed' || 'Failed' }} |
            | Prettier | ${{ steps.format.outcome == 'success' && 'Passed' || 'Failed' }} |
            | TypeScript | ${{ steps.typecheck.outcome == 'success' && 'Passed' || 'Failed' }} |
            | Tests | ${{ steps.test.outcome == 'success' && 'Passed' || 'Failed' }} |
            | Build | ${{ steps.build.outcome == 'success' && 'Passed' || 'Failed' }} |
      - name: Fail if any check failed
        if: |
          steps.lint.outcome == 'failure' ||
          steps.format.outcome == 'failure' ||
          steps.typecheck.outcome == 'failure' ||
          steps.test.outcome == 'failure' ||
          steps.build.outcome == 'failure'
        run: exit 1
