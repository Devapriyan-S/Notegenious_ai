name: Deploy

on:
  push:
    branches: [main]

jobs:
  ci:
    name: CI Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend
      - run: npm run test
        working-directory: frontend

  deploy-backend:
    name: Deploy Backend to Render
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - name: Trigger Render Deploy Hook
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"

  # Note: Frontend on Vercel deploys automatically on every push to main.
  # No manual step is needed here — Vercel watches the GitHub repo directly.
  # To set it up: go to vercel.com, import this repo, set root directory to
  # "frontend", and add NEXT_PUBLIC_API_URL as an environment variable.
